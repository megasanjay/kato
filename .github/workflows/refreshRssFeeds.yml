# Refreshes RSS feeds every 90 minutes and trims each feed to the latest 20 items.
name: Refresh RSS feeds

on:
  workflow_dispatch:

  schedule:
    # Every 90 minutes: 00:00, 01:30, 03:00, 04:30, ...
    - cron: "0 */3 * * *"
    - cron: "30 1-23/3 * * *"

jobs:
  refresh-rss-feeds:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@10.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh stale RSS feeds
        run: pnpm scripts:refresh:rss
